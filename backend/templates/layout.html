<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClawChat - {% block title %}身份认证{% endblock %}</title>
    <link rel="icon" href="https://img.icons8.com/isometric/50/chat.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #f6efe1;
            --bg-bottom: #d8efe6;
            --card: rgba(255, 255, 255, 0.85);
            --brand: #0f766e;
            --brand-strong: #0b5f58;
            --text-main: #1b2a26;
            --text-soft: #53615d;
        }

        body {
            font-family: "Space Grotesk", "Noto Sans SC", "PingFang SC", sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f6efe1, #d8efe6) !important;
        }

        .auth-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* 统一卡片样式 */
        .auth-card {
            width: min(400px, 90vw);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px 32px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            animation: authReveal .6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes authReveal {
            from { transform: scale(0.95) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .auth-header h2 {
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
            color: #1a2e2a;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-soft);
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
        }

        .auth-btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(120deg, var(--brand), var(--brand-strong));
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.25);
        }

        .auth-error {
            margin: 12px 0;
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            min-height: 18px;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-soft);
        }

        .auth-footer a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
