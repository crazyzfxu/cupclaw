        // 切换 agent
        function switchAgent(agentId) {
            if (agentId !== currentAgent) {
                switchAgentInternal(agentId);
            }
            // 手机端点击后进入聊天
            openChat();
        }

        function switchAgentInternal(agentId) {
            // 离开之前的聊天室
            if (currentAgent) {
                if (currentUser && currentUser.id) {
                    socket.emit('leave_room', `agent_${currentAgent}_user_${currentUser.id}`);
                } else {
                    socket.emit('leave_room', `agent_${currentAgent}`);
                }
            }
            
            currentAgent = agentId;
            
            // 更新 UI
            renderContactsList();
            setCurrentAgent(agentId);
            
            // 加入新的聊天室（只加入私有房间）
            if (currentUser && currentUser.id) {
                socket.emit('join_room', `agent_${agentId}_user_${currentUser.id}`);
                // 不加入公共房间 agent_${agentId} 防止收到其他用户的广播
            } else {
                socket.emit('join_room', `agent_${agentId}`);
            }
            
            // 通知服务器
            socket.emit('switch_agent', agentId);
            
            // 加载当前 agent 的消息
            loadMessages();
            renderTaskBoard();
        }

        // 设置当前 agent
        function setCurrentAgent(agentId) {
            currentAgent = agentId;
            const agentInfo = agentsData[agentId] || AGENTS_CONFIG[agentId] || { name: '未知', color: '#6c757d' };
            
            document.getElementById('currentContactName').textContent = agentInfo.name;
            document.getElementById('currentContactAvatar').innerHTML = 
                agentInfo.name.match(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]/gu)?.find(Boolean) || agentInfo.name.charAt(0);
            document.getElementById('currentContactAvatar').style.background = agentInfo.color + '20';
            document.getElementById('currentContactAvatar').style.color = agentInfo.color;
        }

        // 加载当前 agent 的消息
        async function loadMessages() {
            if (!currentAgent) currentAgent = 'main';
            const thisVersion = ++loadVersion;
            const thisAgent = currentAgent;
            
            // 重置状态
            hasMoreMessages = true;
            isLoadingMore = false;
            renderedMessageIds.clear();
            document.getElementById('messages').innerHTML = '';

            try {
                const url = `/api/messages?agent=${thisAgent}&limit=10`;
                const response = await fetch(url, { credentials: 'include' });
                if (response.status === 401) {
                    await checkAuth();
                    return loadMessages();
                }
                const messagesList = await response.json();
                
                if (thisVersion !== loadVersion) return null;
                
                if (messagesList.length < 10) {
                    hasMoreMessages = false;
                }
                
                renderMessages(messagesList);
                
                // 自动滚动到底部：由于消息可能包含图片或复杂 Markdown，使用 setTimeout 确保渲染完成后滚动
                const container = document.getElementById('messages');
                setTimeout(() => {
                    container.scrollTop = container.scrollHeight;
                }, 100);
                
                return messagesList;
            } catch (error) {
                console.error('加载消息失败:', error);
            }
            return null;
        }

        async function loadMoreMessages() {
            if (isLoadingMore || !hasMoreMessages) return;
            
            isLoadingMore = true;
            const container = document.getElementById('messages');
            
            // 找到当前页面最旧的一条渲染出来的 ID
            // 这里过滤掉非数字的临时 ID
            const sortedIds = Array.from(renderedMessageIds)
                                  .filter(id => !String(id).startsWith('local-'))
                                  .sort((a,b) => a-b);
            const oldestId = sortedIds[0];
            
            if (!oldestId) {
                isLoadingMore = false;
                return;
            }

            // 显示加载条
            let loadLabel = document.querySelector('.load-more');
            if (loadLabel) {
                loadLabel.classList.add('loading');
                loadLabel.textContent = '正在加载历史记录...';
            }

            try {
                const url = `/api/messages?agent=${currentAgent}&limit=10&before_id=${oldestId}`;
                const response = await fetch(url, { credentials: 'include' });
                const moreMsgs = await response.json();
                
                if (loadLabel) {
                    loadLabel.classList.remove('loading');
                    loadLabel.textContent = '点击或上滑加载更多历史记录';
                }
                
                if (moreMsgs.length < 10) {
                    hasMoreMessages = false;
                    if (loadLabel) loadLabel.remove();
                }

                if (moreMsgs.length > 0) {
                    const oldScrollHeight = container.scrollHeight;
                    
                    // 在顶部插入消息
                    // 注意：API 返回的是按 ID 降序排列的（最新的在前），所以 reverse() 变成升序，逐个 prepend
                    moreMsgs.reverse().forEach(msg => {
                        if (!renderedMessageIds.has(msg.id)) {
                            prependMessage(msg);
                            renderedMessageIds.add(msg.id);
                        }
                    });
                    
                    // 保持滚动位置：旧的高度 - 当前高度偏移
                    requestAnimationFrame(() => {
                        container.scrollTop = container.scrollHeight - oldScrollHeight;
                    });
                }
            } catch (err) {
                console.error('加载更多失败:', err);
            } finally {
                isLoadingMore = false;
            }
        }

        function prependMessage(msg) {
            if (msg.agent_id !== currentAgent) return;
            const container = document.getElementById('messages');
            const msgEl = createMessageElement(msg);
            
            // 找到加载按钮
            const loadBtn = container.querySelector('.load-more');
            if (loadBtn && loadBtn.nextSibling) {
                container.insertBefore(msgEl, loadBtn.nextSibling);
            } else if (loadBtn) {
                container.appendChild(msgEl);
            } else {
                container.insertBefore(msgEl, container.firstChild);
            }
        }

        function createMessageElement(msg) {
            const div = document.createElement('div');
            // msg.sender is 'user' or 'assistant'
            div.className = `message ${msg.sender || 'system'}`;
            
            let content = '';
            if (msg.type === 'pending_request') {
                const lines = (msg.content || '').split('\n');
                const header = lines.shift() || '';
                const body = lines.join('\n');
                const isDeptHead = currentUser && (currentUser.role === 'dept_head' || currentUser.role === 'ops');
                content = `<div class="pending-item" style="border-left: 3px solid #f97316;">
                    <div style="font-size:12px;font-weight:600;color:#f97316;margin-bottom:6px;">${sanitize(header)}</div>
                    <div style="font-size:13px;color:#334155;white-space:pre-wrap;">${sanitize(body)}</div>
                    ${isDeptHead ? '<div style="margin-top:10px;font-size:12px;color:#94a3b8;">💡 直接回复「批准」或「拒绝」即可审批</div>' : ''}
                </div>`;
            } else {
                content = renderMarkdown(msg.content);
            }
            if (msg.file_url) {
                content += `<div class="file-attachment">📎 <a href="${msg.file_url}" target="_blank">${msg.file_name || '查看文件'}</a></div>`;
            }
            
            // 头像映射
            let avatar = '👤';
            if (msg.sender === 'assistant') {
                avatar = currentAgent === 'main' ? '🏔️' : '🤖';
            } else if (msg.sender === 'user') {
                // 优先从 localStorage 读取用户自定义头像
                const savedProfile = localStorage.getItem('user_profile');
                if (savedProfile) {
                    const profile = JSON.parse(savedProfile);
                    avatar = profile.avatar || '👤';
                } else if (currentUser && currentUser.role) {
                    const avatars = { 'ops': '🛠️', 'dept_head': '📋', 'user': '👤' };
                    avatar = avatars[currentUser.role] || '👤';
                }
            }
            
            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-body">
                    <div class="message-content">${content}</div>
                    <div class="message-meta">${formatTime(msg.timestamp)}</div>
                </div>
            `;
            return div;
        }

        function renderMessages(list) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            renderedMessageIds.clear();
            
            if (hasMoreMessages) {
                const loadBtn = document.createElement('div');
                loadBtn.className = 'load-more';
                loadBtn.textContent = '点击或上滑加载更多历史记录';
                loadBtn.onclick = loadMoreMessages;
                container.appendChild(loadBtn);
            }

            list.forEach(msg => {
                if (!renderedMessageIds.has(msg.id)) {
                    appendMessage(msg);
                }
            });
        }

        // 添加消息到界面
        function appendMessage(msg) {
            if (!msg) return;
            if (msg.agent_id !== currentAgent) return;
            if (renderedMessageIds.has(msg.id)) return;
            
            renderedMessageIds.add(msg.id);
            const container = document.getElementById('messages');
            const div = createMessageElement(msg);
            container.appendChild(div);
            
            // 实时消息：稍微延迟滚动以确保渲染后的高度计算准确
            setTimeout(() => {
                // 如果用户已经往上翻了比较多，不要强制滚到底部（可选交互优化）
                // 这里为了简单仍然滚到底部，或者仅当用户接近底部时滚动
                container.scrollTop = container.scrollHeight;
            }, 60);
        }

        // 更新联系人状态
        function updateContactStatus(agentId, status) {
            if (agentId === currentAgent) {
                document.getElementById('currentContactStatus').textContent = status;
            }
        }

        // 文件选择处理
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileInfo').textContent = `📎 ${file.name} (${formatFileSize(file.size)})`;
                document.getElementById('filePreview').classList.add('show');
            }
        }

        // 移除文件
        function removeFile() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').classList.remove('show');
        }

        // 发送消息
        async function sendMessage() {
            if (sendInFlight) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message && !selectedFile) return;

            console.log('发送消息到 agent:', currentAgent, '内容:', message, selectedFile ? `+ 文件：${selectedFile.name}` : '');
            
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').textContent = '发送中...';
            document.getElementById('typing').classList.add('show');
            sendInFlight = true;
            createTaskCard(message || (selectedFile ? `文件：${selectedFile.name}` : '文件处理请求'));
            startResponseWatchdog();
            
            try {
                let fileUrl = null;
                let fileName = null;
                
                // 先上传文件（如果有）
                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    
                    const uploadResponse = await fetch(`/api/upload`, {
                        method: 'POST',
                        credentials: 'include',
                        body: formData
                    });
                    
                    if (uploadResponse.ok) {
                        const uploadResult = await uploadResponse.json();
                        fileUrl = uploadResult.url;
                        fileName = uploadResult.filename;
                    } else {
                        // 上传失败，抛出错误
                        const errorData = await uploadResponse.json().catch(() => ({error: '上传失败'}));
                        throw new Error(`文件上传失败: ${errorData.error || '未知错误'}`);
                    }
                }
                
                // 发送消息
                if (socket.connected) {
                    socket.emit('send_message', {
                        agent: currentAgent,
                        message: message || '[文件]',
                        file_url: fileUrl,
                        file_name: fileName
                    });
                } else {
                    // Socket 未连接时，通过 HTTP 发送
                    const httpData = {
                        agent: currentAgent,
                        message: message || '[文件]',
                        file_url: fileUrl,
                        file_name: fileName
                    };
                    
                    const httpResponse = await fetch('/api/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(httpData)
                    });
                    
                    if (!httpResponse.ok) {
                        const errorData = await httpResponse.json().catch(() => ({error: '发送失败'}));
                        throw new Error(`HTTP 发送失败: ${errorData.error || '未知错误'}`);
                    }
                    
                    const payload = await httpResponse.json();
                    // 处理 HTTP 响应，模拟 Socket 事件
                    if (payload.user_message) {
                        appendMessage(payload.user_message);
                    }
                    if (payload.assistant_message) {
                        appendMessage(payload.assistant_message);
                    }
                    completeNextTask(currentAgent, '消息已发送');
                    resetInputState();
                }
                
                // 清空输入
                input.value = '';
                removeFile();
                
            } catch (error) {
                console.error('发送失败:', error);
                failNextTask(currentAgent, error && error.message ? error.message : '发送失败');
                alert('发送失败，请重试');
                resetInputState();
            }
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                if (!event.repeat) sendMessage();
            }
        }

        // 渲染 Markdown
        function renderMarkdown(text) {
            try {
                // 配置 marked 渲染器以支持在新窗口打开链接
                const renderer = new marked.Renderer();
                const originalLink = renderer.link.bind(renderer);
                renderer.link = (href, title, text) => {
                    const html = originalLink(href, title, text);
                    return html.replace('<a ', '<a target="_blank" rel="noopener" ');
                };

                // 自动将纯文本 URL 转为可点击链接
                const urlReplaced = (text || '').replace(
                    /((https?:\/\/)[^\s<]+)/g,
                    '<a href="$1" target="_blank" rel="noopener">$1</a>'
                );
                
                const raw = marked.parse(urlReplaced, { renderer });
                return DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
            } catch (e) {
                console.error('Markdown 渲染失败:', e);
                return sanitize(text); // 降级为纯文本
            }
        }

        // 统一 Sanitizer
        const sanitize = (text) => {
            try {
                return DOMPurify.sanitize(String(text ?? ''));
            } catch (e) {
                return String(text ?? '');
            }
        };

        // 格式化时间（完整）
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const isToday = date.getDate() === now.getDate() && 
                date.getMonth() === now.getMonth() && 
                date.getFullYear() === now.getFullYear();
            if (isToday) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' +
                date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 格式化时间（简短）
        function formatTimeShort(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            // 如果是今天
            if (date.getDate() === now.getDate() && 
                date.getMonth() === now.getMonth() && 
                date.getFullYear() === now.getFullYear()) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            
            // 如果是本周
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay());
            if (date >= startOfWeek) {
                const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return days[date.getDay()];
            }
            
            // 否则显示月日
            return (date.getMonth() + 1) + '-' + date.getDate();
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 重置输入状态
        function resetInputState() {
            clearResponseWatchdog();
            sendInFlight = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').textContent = '发送';
            document.getElementById('typing').classList.remove('show');
        }

        // 页面加载完成后初始化
        window.onload = async function() {
            // 登录界面强制清空历史，确保即使 session 还在，也不会在不该显示的时候显示旧内容
            const isAuthOverlayVisible = document.getElementById('authOverlay').classList.contains('show');
            if (isAuthOverlayVisible) {
                agentsData = {};
                renderedMessageIds.clear();
                document.getElementById('messages').innerHTML = '';
                document.getElementById('contactsList').innerHTML = '';
            }

            const ok = await checkAuth();
            if (ok) {
                await initializeAfterLogin();
            } else {
                // 如果未登录，确保 UI 是空的
                agentsData = {};
                renderContactsList();
            }
        };
    </script>
</body>
